name: Run Tests
on:
  - push
  - pull_request
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    env:
      # Fix a bug in the ffmpeg installation via awalsh128/cache-apt-pkgs-action
      LD_LIBRARY_PATH: /usr/lib/x86_64-linux-gnu/lapack:/usr/lib/x86_64-linux-gnu/blas
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - uses: awalsh128/cache-apt-pkgs-action@681749ae568c81c2037cb9185e38b709b261bd2f # v1.6.1
        with:
          packages: sox ffmpeg

      - run: sox --version
      - run: ffmpeg -version

      - name: Fetch everyvoice
        run: |
          git clone https://github.com/EveryVoiceTTS/EveryVoice
          cd EveryVoice
          git checkout ${{ github.ref_name }} || git checkout ${{ github.head_ref }} || true
          git submodule update --init
          cd everyvoice/model/feature_prediction/FastSpeech2_lightning
          git fetch origin ${{ github.ref }}
          git checkout FETCH_HEAD

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.11.21"

      - name: Install the project
        run: |
          cd EveryVoice/everyvoice/model/feature_prediction/FastSpeech2_lightning/
          uv sync --locked --all-extras --dev
          uv pip install --editable ../../../..

      - name: uv pip freeze
        run: |
          cd EveryVoice/everyvoice/model/feature_prediction/FastSpeech2_lightning/
          uv pip freeze
      - name: uv pip list
        run: |
          cd EveryVoice/everyvoice/model/feature_prediction/FastSpeech2_lightning/
          uv pip list

      - name: Run fs2 unit tests
        run: |
          cd EveryVoice/everyvoice/model/feature_prediction/FastSpeech2_lightning/
          uv run coverage run -m pytest
          uv run coverage xml
        env:
          PYTHONPATH: ${{ github.workspace }}/EveryVoice

      - name: Plain text coverage report
        run: |
          cd EveryVoice/everyvoice/model/feature_prediction/FastSpeech2_lightning/
          uv run coverage report

      - uses: codecov/codecov-action@v5
        with:
          fail_ci_if_error: false # optional (default = false)
          token: ${{ secrets.CODECOV_TOKEN }}
